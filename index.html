<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞伯燒烤 - 線上點餐</title>
    <style>
        :root{--primary:#e85d04}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:linear-gradient(135deg,#1a0a00,#3d1c00,#5c2d0a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{background:#fff;border-radius:24px;padding:32px 24px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .logo{font-size:56px;margin-bottom:8px}
        h1{font-size:1.5rem;color:#2d1a0e;margin-bottom:2px}
        .branch{color:#888;font-size:.85rem;margin-bottom:20px}
        .auto-mode{display:none}.auto-mode.show{display:block}
        .table-found{background:#fdf6f0;border:2px solid var(--primary);border-radius:16px;padding:20px;margin-bottom:16px}
        .table-found .icon{font-size:40px}
        .table-found .table-num{font-size:2rem;font-weight:700;color:var(--primary);margin:8px 0}
        .table-found .hint{font-size:.85rem;color:#888}
        .btn-start{display:block;width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:12px;box-shadow:0 4px 16px rgba(232,93,4,.3);font-family:inherit}
        .btn-start:active{transform:scale(.97)}
        .manual-mode{display:none}.manual-mode.show{display:block}
        .btn-toggle{background:none;border:none;color:var(--primary);font-size:.85rem;cursor:pointer;text-decoration:underline;margin-top:8px;font-family:inherit}
        label{display:block;font-weight:600;margin-bottom:8px;color:#5c3a1e;text-align:left;font-size:.9rem}
        input{width:100%;padding:14px;border:2px solid #e0d5ca;border-radius:14px;font-size:1.2rem;font-weight:600;text-align:center;letter-spacing:2px;margin-bottom:16px;font-family:inherit}
        input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(232,93,4,.1)}
        .error{color:#e74c3c;font-size:.85rem;margin-bottom:12px;display:none}
        .loading{color:#888;font-size:.9rem;padding:20px}
    </style>
</head>
<body>
<div class="container">
    <div class="loading" id="loading">🔄 載入中...</div>
    <div class="auto-mode" id="autoMode">
        <div class="logo">🔥</div>
        <h1 id="restName">雞伯燒烤</h1>
        <p class="branch" id="restBranch">新莊店</p>
        <div class="table-found">
            <div class="icon">🪑</div>
            <div class="hint">您的桌號</div>
            <div class="table-num" id="autoTableNum">---</div>
            <div class="hint">掃描 QR Code 自動識別</div>
        </div>
        <button class="btn-start" onclick="startOrder()">開始點餐 🍽️</button>
        <button class="btn-toggle" onclick="switchToManual()">這不是我的桌號？手動輸入</button>
    </div>
    <div class="manual-mode" id="manualMode">
        <div class="logo">🔥</div>
        <h1 id="restName2">雞伯燒烤</h1>
        <p class="branch" id="restBranch2">新莊店</p>
        <label>🪑 請輸入您的桌號</label>
        <input type="text" id="tableInput" placeholder="例如：A12" maxlength="10" autocomplete="off">
        <p class="error" id="errorMsg">請輸入桌號</p>
        <button class="btn-start" onclick="manualStart()">進入點餐 🍽️</button>
        <button class="btn-toggle" onclick="switchToAuto()" id="btnBackAuto" style="display:none">← 返回自動識別</button>
    </div>
</div>
<script>
var SUPABASE_URL='https://ezgxzbbygadaqyvajulk.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6Z3h6YmJ5Z2FkYXF5dmFqdWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDQ1ODgsImV4cCI6MjA5NjQyMDU4OH0.vuIk8DQuBLwMDuHp38ez52pH6Ju-UfcmLe0ltXLuHjw';
var detectedTable=null,restInfo={name:'雞伯燒烤',branch:'新莊店'};
async function init(){
    try{var r=await fetch(SUPABASE_URL+'/rest/v1/restaurant_info?id=eq.1',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});var d=await r.json();if(d.length>0)restInfo=d[0]}catch(e){}
    document.getElementById('restName').textContent=restInfo.name;
    document.getElementById('restBranch').textContent=restInfo.branch;
    document.getElementById('restName2').textContent=restInfo.name;
    document.getElementById('restBranch2').textContent=restInfo.branch;
    var p=new URLSearchParams(window.location.search);detectedTable=p.get('table');
    document.getElementById('loading').style.display='none';
    if(detectedTable){
        document.getElementById('autoTableNum').textContent=detectedTable;
        document.getElementById('autoMode').classList.add('show');
        document.getElementById('btnBackAuto').style.display='inline-block';
    }else{
        document.getElementById('manualMode').classList.add('show');
        document.getElementById('tableInput').focus();
    }
}
function startOrder(){if(detectedTable){sessionStorage.setItem('currentTable',detectedTable);window.location.href='menu.html'}}
function manualStart(){var t=document.getElementById('tableInput').value.trim();if(!t){document.getElementById('errorMsg').style.display='block';return}sessionStorage.setItem('currentTable',t);window.location.href='menu.html'}
function switchToManual(){document.getElementById('autoMode').classList.remove('show');document.getElementById('manualMode').classList.add('show');document.getElementById('tableInput').focus()}
function switchToAuto(){document.getElementById('manualMode').classList.remove('show');document.getElementById('autoMode').classList.add('show')}
document.getElementById('tableInput').addEventListener('keydown',function(e){if(e.key==='Enter')manualStart()});
init();
</script>
</body>
</html>
