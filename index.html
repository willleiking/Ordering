<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞伯燒烤 - 歡迎</title>
    <style>
        :root {
            --primary: #e85d04;
            --bg: #fdf6f0;
            --text: #2d1a0e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a0a00 0%, #3d1c00 40%, #5c2d0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 1.8rem;
            color: #2d1a0e;
            margin-bottom: 4px;
        }
        .branch {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #5c3a1e;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0d5ca;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 2px;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(232,93,4,0.1);
        }
        .btn-enter {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(232,93,4,0.3);
        }
        .btn-enter:hover {
            background: #c44b03;
            transform: translateY(-2px);
        }
        .btn-enter:active {
            transform: scale(0.97);
        }
        .hint {
            margin-top: 16px;
            color: #aaa;
            font-size: 0.8rem;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔥</div>
        <h1>雞伯燒烤</h1>
        <p class="branch">RIA店</p>
        
        <div class="input-group">
            <label for="tableInput">🪑 請輸入您的桌號</label>
            <input 
                type="text" 
                id="tableInput" 
                placeholder="例如：A12" 
                maxlength="10"
                autocomplete="off"
                inputmode="text"
            >
            <div class="error-msg" id="errorMsg">請輸入桌號</div>
        </div>
        
        <button class="btn-enter" id="btnEnter" onclick="enterMenu()">
            進入點餐 🍽️
        </button>
        
        <p class="hint">請查看桌上的桌號牌</p>
    </div>

    <script>
        function enterMenu() {
            const tableInput = document.getElementById('tableInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!tableInput) {
                errorMsg.style.display = 'block';
                document.getElementById('tableInput').focus();
                return;
            }
            
            errorMsg.style.display = 'none';
            
            // 儲存桌號到 sessionStorage
            sessionStorage.setItem('currentTable', tableInput);
            
            // 跳轉到點餐頁面
            window.location.href = 'menu.html';
        }
        
        // 鍵盤 Enter 也可以進入
        document.getElementById('tableInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                enterMenu();
            }
        });
        
        // 自動聚焦輸入框
        document.getElementById('tableInput').focus();
        
        // 如果已經有桌號（從菜單頁返回），預先填入
        const savedTable = sessionStorage.getItem('currentTable');
        if (savedTable) {
            document.getElementById('tableInput').value = savedTable;
        }
    </script>
</body>
</html>
